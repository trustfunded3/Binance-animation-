<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binance Login & Sign Up</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #181a20; color: #eaecef; font-family: 'Inter', sans-serif; }
        .binance-yellow { background-color: #fcd535; color: #181a20; }
        .binance-yellow:hover { background-color: #f0c51d; }
        .input-bg { background-color: #2b2f36; border: 1px solid transparent; }
        .input-bg:focus-within { border-color: #fcd535; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md p-8 rounded-xl shadow-2xl">
        <div class="flex flex-col items-center mb-8">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Binance_Logo.svg" alt="Binance Logo" class="w-40 mb-4">
            <h1 id="page-title" class="text-3xl font-bold">Welcome to Binance</h1>
        </div>

        <div id="login-form">
            <div class="mb-4">
                <label class="block text-sm text-gray-400 mb-1">Email/Phone number</label>
                <div class="input-bg rounded-md p-3 flex items-center">
                    <input type="text" placeholder="Email/Phone (without country code)" class="bg-transparent w-full outline-none text-sm">
                </div>
            </div>

            <div class="mb-4">
                <div class="input-bg rounded-md p-3 flex items-center justify-between">
                    <input type="password" placeholder="Enter password" class="bg-transparent w-full outline-none text-sm">
                    <i class="fa-regular fa-eye text-gray-500 cursor-pointer"></i>
                </div>
            </div>

            <div class="flex items-start mb-6">
                <input type="checkbox" class="mt-1 mr-2 accent-yellow-400">
                <span class="text-xs text-gray-400">By creating an account, I agree to Binance's <a href="#" class="underline">Privacy Notice</a>.</span>
            </div>

            <button class="binance-yellow w-full py-3 rounded-md font-bold mb-4">Continue</button>
            <div class="text-center text-gray-500 text-sm mb-4">or</div>
            <button onclick="toggleForms()" class="w-full border border-gray-600 py-3 rounded-md font-bold hover:bg-gray-800 transition">Sign Up</button>
        </div>

        <div id="signup-form" class="hidden">
            <div class="mb-4">
                <div class="input-bg rounded-md p-3 flex items-center">
                    <i class="fa-solid fa-envelope text-yellow-500 mr-3"></i>
                    <input type="email" placeholder="Email address" class="bg-transparent w-full outline-none text-sm">
                </div>
            </div>

            <div class="mb-4">
                <div class="input-bg rounded-md p-3 flex items-center justify-between">
                    <div class="flex items-center w-full">
                        <i class="fa-solid fa-lock text-yellow-500 mr-3"></i>
                        <input type="password" placeholder="Password" class="bg-transparent w-full outline-none text-sm">
                    </div>
                    <i class="fa-regular fa-eye text-gray-500 cursor-pointer"></i>
                </div>
            </div>

            <div class="mb-4">
                <div class="input-bg rounded-md p-3">
                    <input type="text" placeholder="Referral ID (optional)" class="bg-transparent w-full outline-none text-sm text-gray-400">
                </div>
            </div>

            <div class="flex items-start mb-6">
                <input type="checkbox" class="mt-1 mr-2 accent-yellow-400">
                <span class="text-xs text-gray-400">By creating an account, I agree to Binance's <a href="#" class="text-yellow-500">Terms of Service</a> and <a href="#" class="text-yellow-500">Privacy Notice</a>.</span>
            </div>

            <button class="binance-yellow w-full py-3 rounded-md font-bold mb-4">Create Account</button>
            <p class="text-center text-sm text-gray-400">
                Already have an account? <a href="javascript:void(0)" onclick="toggleForms()" class="text-yellow-500 hover:underline">Log in</a>
            </p>
        </div>
    </div>

    <script>
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const title = document.getElementById('page-title');

            if (loginForm.classList.contains('hidden')) {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                title.innerText = "Welcome to Binance";
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                title.innerText = "Sign Up to Binance";
            }
        }
    </script>
</body>
</html>
