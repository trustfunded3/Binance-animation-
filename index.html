<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustFunded</title>
    <style>
        :root {
            --binance-yellow: #FCD535;
            --bg-dark: #0B0E11;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-dark);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; 
        }

        /* Full-screen Loader Container */
        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease-out;
            background-color: var(--bg-dark);
        }

        /* The Logo (Diamond) Animation */
        .logo-diamond {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: rotateZ 2s cubic-bezier(0.45, 0, 0.55, 1) forwards;
        }

        @keyframes rotateZ {
            0% { transform: rotateY(0deg) scale(0.5); opacity: 0; }
            50% { transform: rotateY(180deg) scale(1.1); opacity: 1; }
            100% { transform: rotateY(360deg) scale(1); opacity: 1; }
        }

        /* The Alphabet Animation */
        .brand-name {
            display: flex;
            gap: 4px;
        }

        .letter {
            color: var(--binance-yellow);
            font-size: 2.5rem;
            font-weight: bold;
            display: inline-block;
            opacity: 0;
            transform: translateY(20px);
            animation: letterEntry 0.6s ease-out forwards;
        }

        /* Staggered entry for each letter */
        .letter:nth-child(1) { animation-delay: 0.8s; }
        .letter:nth-child(2) { animation-delay: 0.9s; }
        .letter:nth-child(3) { animation-delay: 1.0s; }
        .letter:nth-child(4) { animation-delay: 1.1s; }
        .letter:nth-child(5) { animation-delay: 1.2s; }
        .letter:nth-child(6) { animation-delay: 1.3s; }
        .letter:nth-child(7) { animation-delay: 1.4s; }

        @keyframes letterEntry {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Main Content - Centered Positioning */
        #main-site {
            position: fixed; /* Fixed to keep it centered regardless of content */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            color: white;
            transition: opacity 1s ease-in;
            pointer-events: none;
        }

        .show-site #main-site { 
            opacity: 1; 
            pointer-events: all;
        }
        
        .hide-loader #loader-wrapper { 
            opacity: 0; 
            pointer-events: none; 
        }
        
        h1 {
            font-size: 2.8rem;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="loader-wrapper">
        <svg class="logo-diamond" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 0L33.6 9.6L24 19.2L14.4 9.6L24 0Z" fill="#FCD535"/>
            <path d="M33.6 9.6L43.2 19.2L33.6 28.8L24 19.2L33.6 9.6Z" fill="#FCD535"/>
            <path d="M24 19.2L33.6 28.8L24 38.4L14.4 28.8L24 19.2Z" fill="#FCD535"/>
            <path d="M14.4 9.6L24 19.2L14.4 28.8L4.8 19.2L14.4 9.6Z" fill="#FCD535"/>
        </svg>

        <div class="brand-name">
            <span class="letter">B</span>
            <span class="letter">I</span>
            <span class="letter">N</span>
            <span class="letter">A</span>
            <span class="letter">N</span>
            <span class="letter">C</span>
            <span class="letter">E</span>
        </div>
    </div>

    <div id="main-site">
        <h1>Welcome to the Platform</h1>
    </div>

    <script>
        window.addEventListener('load', () => {
            // Loader will disappear after 3.2 seconds total
            setTimeout(() => {
                document.body.classList.add('hide-loader');
                document.body.classList.add('show-site');
                document.body.style.overflow = 'auto';
            }, 3200); 
        });
    </script>
</body>
</html>
